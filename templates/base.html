<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page_title or "Swiss Weather" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <header class="header">
      <div class="container header__inner">
        <div>
          <div class="title">Swiss Weather</div>
          <div class="subtitle">
            Source: <a href="{{ meta.doc_url }}" target="_blank" rel="noreferrer">Open‑Meteo MeteoSwiss ICON</a>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <script id="bootstrap-data" type="application/json">
      {{ {"city": city, "series24h": series24h, "activeView": active_view|default("dashboard"), "currentHour": current_hour|default(12)}|tojson }}
    </script>
    {% block before_app_js %}{% endblock %}
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block body_extra %}{% endblock %}
  </body>
</html>
